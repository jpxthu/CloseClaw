name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      test_target:
        description: 'Test target to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lib
          - integration
          - doc

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check commit message for issue reference
        if: github.event_name == 'push'
        run: |
          # Skip for reviewer checkpoint commits (authored by Reviewer)
          author=$(git log -1 --format='%an')
          if [[ "$author" == "Reviewer" ]]; then
            echo "Skipping commit-msg check for reviewer checkpoint"
            exit 0
          fi
          # Check latest commit has Fixes #N or Refs #N
          msg=$(git log -1 --format='%B')
          if ! echo "$msg" | grep -qE '(Fixes|Refs|refs|refs) #[0-9]+'; then
            echo "ERROR: Commit message missing 'Fixes #N' or 'Refs #N' footer"
            echo "Commit message:"
            echo "$msg"
            exit 1
          fi
          echo "Commit message check passed"

      - name: Run unit and binary tests
        run: cargo test --lib --bins

      - name: Run integration tests
        run: cargo test --tests

      - name: Run doc tests
        run: cargo test --doc
