name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      test_target:
        description: 'Test target to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lib
          - integration
          - doc

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check commit message format
        if: github.event_name == 'push'
        run: |
          set -e

          msg=$(git log -1 --format='%B')

          echo "=== Commit message ==="
          echo "$msg"
          echo ""

          # 1. Check Source: footer
          if ! echo "$msg" | grep -qE '^Source: (issue #[0-9]+|Fixes #|Refs #|Closes #|CI|user)'; then
            echo "ERROR: Source footer must be one of:"
            echo "  - issue #N"
            echo "  - Fixes #N / Refs #N / Closes #N (legacy)"
            echo "  - CI"
            echo "  - user"
            echo "Commit message:"
            echo "$msg"
            exit 1
          fi

          # 2. Check Type: footer
          valid_types="feat|fix|docs|refactor|test|perf|chore"
          if ! echo "$msg" | grep -qE "^Type: ($valid_types)"; then
            echo "ERROR: Type footer must be one of: $valid_types"
            echo "Commit message:"
            echo "$msg"
            exit 1
          fi

          echo "Commit message check passed"
          echo "- Source: $(echo "$msg" | grep '^Source:' | sed 's/^Source: //')"
          echo "- Type: $(echo "$msg" | grep '^Type:' | sed 's/^Type: //')"

      - name: Run unit and binary tests
        run: cargo test --lib --bins

      - name: Run integration tests
        run: cargo test --tests

      - name: Run doc tests
        run: cargo test --doc
