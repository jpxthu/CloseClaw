name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      test_target:
        description: 'Test target to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lib
          - integration
          - doc

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check commit message format
        if: github.event_name == 'push'
        run: |
          set -e

          msg=$(git log -1 --format='%B')

          echo "=== Commit message ==="
          echo "$msg"
          echo ""

          # 1. Check Source: footer
          if ! echo "$msg" | grep -qE '^Source: (issue #[0-9]+|Fixes #|Refs #|Closes #|CI|user)'; then
            echo "ERROR: Source footer must be one of:"
            echo "  - issue #N"
            echo "  - Fixes #N / Refs #N / Closes #N (legacy)"
            echo "  - CI"
            echo "  - user"
            echo "Commit message:"
            echo "$msg"
            exit 1
          fi

          # 2. Check Type: footer
          valid_types="feat|fix|docs|refactor|test|perf|chore"
          if ! echo "$msg" | grep -qE "^Type: ($valid_types)"; then
            echo "ERROR: Type footer must be one of: $valid_types"
            echo "Commit message:"
            echo "$msg"
            exit 1
          fi

          echo "Commit message check passed"
          echo "- Source: $(echo "$msg" | grep '^Source:' | sed 's/^Source: //')"
          echo "- Type: $(echo "$msg" | grep '^Type:' | sed 's/^Type: //')"

      - name: Check formatting
        run: cargo fmt --check

      - name: Check env var prohibition
        run: |
          set -e
          # 禁止 set_var / remove_var（load_env_file 除外）
          # 详见 CONTRIBUTING.md「环境变量禁令」
          #
          # 白名单：已知存量违规文件，待逐步清理后移除
          whitelist=(
            src/daemon/mod.rs
          )
          matches=$(grep -rn '\bset_var\b\|\bremove_var\b' src/ --include='*.rs' | grep -v 'load_env_file' || true)
          if [ -n "$matches" ]; then
            violations=""
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d: -f1)
              is_whitelisted=false
              for wl in "${whitelist[@]}"; do
                if [ "$file" = "$wl" ]; then
                  is_whitelisted=true
                  break
                fi
              done
              if [ "$is_whitelisted" = false ]; then
                violations="$violations\n$line"
              fi
            done <<< "$matches"
            if [ -n "$violations" ]; then
              echo "ERROR: 检测到 std::env::set_var / remove_var 调用："
              echo -e "$violations"
              echo ""
              echo "环境变量修改在多线程和并行测试中会导致数据竞争，全代码库禁止使用。"
              echo "唯一例外：daemon/mod.rs 中的 load_env_file()（启动阶段加载 .env 文件）。"
              echo ""
              echo "正确做法："
              echo "  - 配置值通过参数/config struct 传递，不写入全局 env"
              echo "  - 测试中用依赖注入或临时文件路径代替 set_var"
              echo "  - 只读取环境变量请用 std::env::var（安全）"
              echo ""
              echo "详见 CONTRIBUTING.md「环境变量禁令」"
              exit 1
            fi
          fi
          echo "env var check passed"

      - name: Strict warning check
        run: cargo check

      - name: Run clippy
        run: cargo clippy --all 2>&1 | tee clippy-output.txt
        continue-on-error: true

      - name: Check clippy warnings
        run: |
          warnings=$(grep -c '^warning' clippy-output.txt || true)
          if [ "$warnings" -gt 0 ]; then
            echo "⚠️ $warnings clippy warnings found. Fix before enabling strict mode."
            echo "List of warnings:"
            grep -E '(warning\[|warning:)' clippy-output.txt || true
            echo ""
            echo "Once all warnings are resolved, remove continue-on-error from the clippy step"
            echo "and add -- -D warnings to fail on warnings."
          fi

      - name: Run unit and binary tests
        run: cargo test --lib --bins

      - name: Run integration tests
        run: cargo test --tests

      - name: Run doc tests
        run: cargo test --doc
