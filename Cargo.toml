[package]
name = "closeclaw"
version = "0.1.0"
edition = "2021"
authors = ["CloseClaw Team"]
description = "Lightweight, rule-driven multi-agent execution framework"
license = "MIT"
repository = "https://github.com/jpxthu/CloseClaw"
rust-version = "1.75"

[dependencies]
# Async runtime - pinned to older version to avoid edition2024 issues
tokio = { version = "=1.35.0", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging - pinned to older versions
tracing = "=0.1.43"
tracing-subscriber = { version = "=0.3.17", features = ["env-filter", "json"] }

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Linux system APIs (seccomp, landlock)
libc = "0.2"

# Async channels
flume = "=0.11"

# UUID generation
uuid = { version = "1.6", features = ["v4", "serde"] }

# Date/time handling
chrono = { version = "0.4", features = ["serde"] }

# Async trait (for IMAdapter)
async-trait = "0.1"

# Hashing (for signature validation)
sha2 = "0.10"

# File watching (hot reload)
notify = "6.1"
notify-debouncer-mini = "0.4"

# CLI argument parsing
clap = { version = "4.4", features = ["derive"] }

[dev-dependencies]
# Testing
proptest = "=1.4"
tempfile = "3.10"

[lib]
name = "closeclaw"
path = "src/lib.rs"

[[bin]]
name = "closeclaw"
path = "src/main.rs"
